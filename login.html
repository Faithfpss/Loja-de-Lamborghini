<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="header-page">
      <div class="container header-container">
        <h1>Imperium Auto Club <i class="bi bi-car-front"></i></h1>
        <nav>
          <ul class="header-menu">
            <li><a href="./index.html" class="item-menu">Home</a></li>
            <li><a href="./login.html" class="item-menu">Login</a></li>
            <li><a href="./loja.html" class="item-menu">Loja</a></li>
            <li><a href="./suporte.html" class="item-menu">Suporte</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="page">
      <div class="login-box">
        <h2 class="title">Login</h2>
        <p class="subtitle">Entre com sua conta</p>

        <form id="loginForm">
          <div class="form-floating mb-3">
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="email"
              required
            />
            <label for="email">Email</label>
          </div>

          <div class="form-floating mb-1">
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="senha"
              required
            />
            <label for="password">Senha</label>
          </div>

          <div class="password-rules">
            <p id="rule-upper">• Pelo menos 1 letra maiúscula</p>
            <p id="rule-special">• Pelo menos 1 caractere especial (!@#$...)</p>
          </div>

          <div id="errorMsg" class="error-msg"></div>

          <button class="btn btn-primary w-100 py-2" type="submit">
            Entrar
          </button>
        </form>
      </div>
    </div>
    <script src="Script.js"></script>
  </body>
</html>
