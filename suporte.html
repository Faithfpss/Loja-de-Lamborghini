<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imperium Auto Club</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container header-container">
      <h1>Imperium Auto Club <i class="bi bi-car-front"></i></h1>
      <nav>
        <ul class="header-menu">
          <li><a href="./index.html" class="item-menu">Home</a></li>
          <li><a href="./login.html" class="item-menu">Login</a></li>
          <li><a href="./loja.html" class="item-menu">Loja</a></li>
          <li><a href="./suporte.html" class="item-menu">Suporte</a></li>
        </ul>
      </nav>
    </div>
    <section class="newsletter">
      <div class="container" style="text-align: center; padding: 80px 0">
        <h2>Fique por dentro das Novidades</h2>
        <form class="newsletter-form" id="form-newsletter">
          <input
            type="email"
            id="email-input"
            placeholder="Seu melhor e-mail"
            required
          />
          <button type="submit">Inscrever-se</button>
        </form>
      </div>
    </section>
    <form class="contato-form">
      <h4>Para a compra do seu Lamborghini, envie sua proposta abaixo</h4>

      <label>Nome Completo</label>
      <input type="text" placeholder="Ex: João Silva" required />

      <label>Sua Mensagem</label>
      <textarea
        placeholder="Descreva sua proposta ou dúvida..."
        rows="5"
        required
      ></textarea>

      <button type="submit">Enviar Proposta</button>
    </form>
    <footer class="footer">
      <div
        class="container"
        style="
          display: flex;
          justify-content: space-between;
          padding: 60px 0;
          border-top: 1px solid #30363d;
        "
      >
        <div class="footer-brand">
          <p>Exclusividade não se compra em qualquer lugar.</p>
        </div>
        <div class="footer-social">
          <h4>Redes Sociais</h4>
          <p><i class="bi bi-instagram"></i> <i class="bi bi-discord"></i></p>
        </div>
      </div>
    </footer>
    <script src="Script.js"></script>
  </body>
</html>
